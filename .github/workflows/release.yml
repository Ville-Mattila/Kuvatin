name: release

# Build the macOS universal .dmg and the Windows .msi. On a version tag
# (v1.4.0) both are attached to the GitHub Release; on manual dispatch they are
# uploaded as workflow artifacts.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install librsvg (icon rendering)
        run: brew install librsvg

      - name: Read version
        id: ver
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Build (aarch64)
        run: cargo build --release -p kuvatin --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release -p kuvatin --target x86_64-apple-darwin

      - name: Assemble .app and .dmg
        run: |
          chmod +x scripts/build-macos-dmg.sh
          scripts/build-macos-dmg.sh "${{ steps.ver.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: kuvatin-macos-universal
          path: dist/*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Install WiX Toolset v3 (no-admin binaries)
        shell: pwsh
        run: |
          $dest = "$env:USERPROFILE\wix3-bin"
          Invoke-WebRequest `
            -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
            -OutFile "$env:TEMP\wix314-binaries.zip"
          Expand-Archive "$env:TEMP\wix314-binaries.zip" -DestinationPath $dest -Force
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        working-directory: crates/kuvatin
        run: cargo wix -p kuvatin --nocapture

      - uses: actions/upload-artifact@v4
        with:
          name: kuvatin-windows-msi
          path: target/wix/*.msi

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/*.msi
