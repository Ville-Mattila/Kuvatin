name: release

# Build the Windows .msi. On a version tag (v1.5.0) it is attached to the GitHub
# Release; on manual dispatch it is uploaded as a workflow artifact.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Install WiX Toolset v3 (no-admin binaries)
        shell: pwsh
        run: |
          $dest = "$env:USERPROFILE\wix3-bin"
          Invoke-WebRequest `
            -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
            -OutFile "$env:TEMP\wix314-binaries.zip"
          Expand-Archive "$env:TEMP\wix314-binaries.zip" -DestinationPath $dest -Force
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        working-directory: crates/kuvatin
        run: cargo wix -p kuvatin --nocapture

      - uses: actions/upload-artifact@v4
        with:
          name: kuvatin-windows-msi
          path: target/wix/*.msi

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/*.msi
