name: release

# Build the Windows .msi. On a version tag (v2.0.0) it is attached to the GitHub
# Release; on manual dispatch it is uploaded as a workflow artifact.
#
# Hardening: third-party downloads (GStreamer MSIs, WiX zip) are pinned by
# SHA-256 and the build fails on mismatch — they are executed and their DLLs are
# harvested into the shipped installer, so an upstream/CDN compromise must not
# flow through. Actions are pinned to commit SHAs. The deterministic test suite
# (core + gui) runs before the MSI is built, so a tag push can't ship code that
# fails those tests; the live-media video suite runs advisory (it's environment-
# sensitive on the hosted runner) and is gated locally instead.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GST_VERSION: "1.26.11"
  # SHA-256 of the exact pinned downloads (recompute with Get-FileHash if bumping).
  GST_RUNTIME_SHA256: "31CBC21FA0950B5C1E79C80959B2799805CB05A7A35953A13A9F790776137605"
  GST_DEVEL_SHA256: "AF0A0720692052AAF5FB0CF2847EF34A87016EF0F914328D516F049E6C86F587"
  WIX_ZIP_SHA256: "6AC824E1642D6F7277D0ED7EA09411A508F6116BA6FAE0AA5F2C7DAA2FF43D31"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # For a tag build, the tag must match the workspace version the MSI is
      # stamped with — otherwise we'd publish e.g. v2.0.1 carrying a 2.0.0 MSI.
      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ver = (Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $tag = "${{ github.ref_name }}" -replace '^v',''
          if ($ver -ne $tag) { throw "tag $tag != workspace version $ver" }
          Write-Host "tag and version agree: $ver"

      - name: Install GStreamer (runtime + devel), checksum-pinned
        shell: pwsh
        run: |
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$env:GST_VERSION/msvc"
          $files = @(
            @{ Name = "gstreamer-1.0-msvc-x86_64-$env:GST_VERSION.msi";       Sha = "$env:GST_RUNTIME_SHA256" },
            @{ Name = "gstreamer-1.0-devel-msvc-x86_64-$env:GST_VERSION.msi"; Sha = "$env:GST_DEVEL_SHA256" }
          )
          foreach ($f in $files) {
            $path = "$env:TEMP\$($f.Name)"
            Invoke-WebRequest -Uri "$base/$($f.Name)" -OutFile $path
            $got = (Get-FileHash $path -Algorithm SHA256).Hash
            if ($got -ne $f.Sha) { throw "checksum mismatch for $($f.Name): got $got expected $($f.Sha)" }
            Start-Process msiexec -ArgumentList "/i", "`"$path`"", "/qn", "ADDLOCAL=ALL", "/norestart" -Wait -NoNewWindow
          }
          # The build env (PKG_CONFIG etc.) comes from .cargo/config.toml; add the
          # runtime bin to PATH so the harvest, the tests, and any run find it.
          "C:\Program Files\gstreamer\1.0\msvc_x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Deterministic suites (no media, no GStreamer runtime) gate the release:
      # a failing tag push never ships. This is a single cargo invocation so its
      # exit code is the step's exit code.
      - name: Test (core + gui — gates the release)
        shell: pwsh
        run: |
          $env:Path = "C:\Program Files\gstreamer\1.0\msvc_x86_64\bin;$env:Path"
          cargo test -p kuvatin-core -p kuvatin --release

      # The video suite drives live GES/GStreamer media pipelines off synthetic
      # fixtures and is environment-sensitive on the hosted runner (asset-URI
      # resolution in particular), so it runs for signal but does NOT block the
      # release — the video engine's real gate is the local test discipline.
      # Fixtures live under the workspace (a clean long path — the runner's
      # %TEMP% is an 8.3 short path GStreamer's URI opener can choke on). Must be
      # single-threaded: concurrent GES pipelines deadlock.
      - name: Test (video integration — advisory, live media)
        shell: pwsh
        continue-on-error: true
        run: |
          $env:Path = "C:\Program Files\gstreamer\1.0\msvc_x86_64\bin;$env:Path"
          $env:RUST_BACKTRACE = "1"
          $fixdir = Join-Path $env:GITHUB_WORKSPACE "target\test-fixtures"
          New-Item -ItemType Directory -Force -Path $fixdir | Out-Null
          $fx = Join-Path $fixdir "fixture_av.webm"
          $img = Join-Path $fixdir "fixture.png"
          gst-launch-1.0 -e videotestsrc num-buffers=150 ! "video/x-raw,width=320,height=180" ! vp8enc ! webmmux name=m ! filesink location=$fx audiotestsrc num-buffers=300 ! audioconvert ! vorbisenc ! m.
          gst-launch-1.0 videotestsrc num-buffers=1 ! "video/x-raw,width=320,height=180" ! pngenc ! filesink location=$img
          if (-not (Test-Path $fx) -or (Get-Item $fx).Length -eq 0) { throw "fixture webm not created at $fx" }
          if (-not (Test-Path $img) -or (Get-Item $img).Length -eq 0) { throw "fixture png not created at $img" }
          Write-Host "fixtures ready: $fx, $img"
          $env:GST_TEST_FILE = $fx
          $env:GST_TEST_IMAGE = $img
          cargo test -p kuvatin-video --release -- --test-threads=1

      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.9 --locked

      - name: Install WiX Toolset v3 (no-admin binaries), checksum-pinned
        shell: pwsh
        run: |
          $dest = "$env:USERPROFILE\wix3-bin"
          $zip = "$env:TEMP\wix314-binaries.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
            -OutFile $zip
          $got = (Get-FileHash $zip -Algorithm SHA256).Hash
          if ($got -ne "$env:WIX_ZIP_SHA256") { throw "checksum mismatch for wix314-binaries.zip: got $got expected $env:WIX_ZIP_SHA256" }
          Expand-Archive $zip -DestinationPath $dest -Force
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI (bundling GStreamer runtime)
        shell: pwsh
        run: |
          $stage = "$env:GITHUB_WORKSPACE\target\gst-staging"
          & crates\kuvatin\wix\bundle-gstreamer.ps1 -StageDir $stage -HeatExe "$env:USERPROFILE\wix3-bin\heat.exe"
          cd crates\kuvatin
          cargo wix -p kuvatin --nocapture --compiler-arg "-dGstStageDir=$stage"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kuvatin-windows-msi
          path: target/wix/*.msi

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: target/wix/*.msi
